<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="panel-page binding-page">
    <main class="binding-shell">
      <div class="binding-card">
        <span class="page-tag">微信渠道绑定</span>
        <h1>{{.Binding.ChannelName}}</h1>
        <p>扫码后点击确认，回到智能体配置页继续完成渠道启用。</p>
        <div class="qr-box">
          <img src="{{.QRDataURI}}" alt="微信绑定二维码" />
        </div>
        <div class="binding-meta">
          <p><strong>状态：</strong>{{.Binding.Status}}</p>
          <p><strong>Token：</strong><span class="mono">{{.Binding.ScanToken}}</span></p>
        </div>
        <form method="post" action="/bindings/{{.Binding.ScanToken}}">
          <button class="button full" type="submit">我已扫码，确认绑定</button>
        </form>
        <a class="button button-ghost full" href="{{.ChannelBindingURL}}">返回智能体配置</a>
      </div>
    </main>
  </body>
</html>
