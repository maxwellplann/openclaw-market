<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="binding-page">
    <main class="shell binding-shell">
      <a class="text-link" href="/dashboard">返回控制台</a>
      <section class="binding-card">
        <div class="binding-copy">
          <span class="eyebrow">渠道绑定</span>
          <h1>{{.Binding.ChannelName}} 连接智能体</h1>
          <p>
            扫描下方二维码，将 channel 接入当前 Agent。这个流程预留了真实微信回调的替换点，
            现在用确认按钮模拟扫码完成。
          </p>
          <div class="binding-meta">
            <span>绑定状态：{{.Binding.Status}}</span>
            <span>Token：{{.Binding.ScanToken}}</span>
          </div>
          <form method="post" action="/bindings/{{.Binding.ScanToken}}">
            <button type="submit">已扫码，完成绑定</button>
          </form>
        </div>
        <div class="qr-card">
          <img src="{{.QRDataURI}}" alt="微信绑定二维码" />
          <code>{{.Binding.QRContent}}</code>
        </div>
      </section>
    </main>
  </body>
</html>
